name: Publish and Minify HTML Templates

on:
  push:
    branches:
      - main

jobs:
  minify-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install html-minifier-terser
        run: npm install -g html-minifier-terser

      - name: Minify HTML templates
        run: |
          mkdir -p somedir/templates
          for file in somedir/templates/*.html; do
            base=$(basename "$file" .html)
            html-minifier-terser \
              --collapse-whitespace \
              --remove-comments \
              --minify-js true \
              --minify-css true \
              -o "somedir/templates/${base}.min.html" \
              "$file"
          done

      - name: Publish
        run: |
          echo "Publishing..."
