<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Clouded</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
          <div style="font-size: 2rem;">☁️</div>
          <h1>Deployments</h1>
        </div>
        <p style="color: var(--text-secondary);">
          Manage your GitHub repository deployments
        </p>
      </div>
      
      <div class="user-menu">
        <button class="btn btn-primary" id="newDeployBtn" style="padding: 0.75rem 1.5rem;">
          <span>➕</span>
          New Deployment
        </button>
        <div class="user-avatar" id="userAvatar">U</div>
        <div>
          <div style="font-weight: 600;" id="username">Loading...</div>
          <button 
            id="logoutBtn" 
            style="background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 0.85rem; padding: 0;"
          >
            Logout
          </button>
        </div>
      </div>
    </div>

    <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
      <div style="flex: 1; background: var(--bg-card); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border);">
        <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;">
          Total Deployments
        </div>
        <div style="font-size: 2rem; font-weight: 700;">3</div>
      </div>
      
      <div style="flex: 1; background: var(--bg-card); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border);">
        <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;">
          Active
        </div>
        <div style="font-size: 2rem; font-weight: 700; color: var(--success);">2</div>
      </div>
      
      <div style="flex: 1; background: var(--bg-card); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border);">
        <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;">
          Building
        </div>
        <div style="font-size: 2rem; font-weight: 700; color: var(--warning);">1</div>
      </div>
    </div>

    <div id="deploymentsGrid" class="deployments-grid"></div>
  </div>

  <script src="/static/js/app.js"></script>
  <script src="/static/js/dashboard.js"></script>
</body>
</html>
