<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in - Clouded</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <script src="/iam-captcha.js" async defer></script>
</head>
<body>
  <div class="auth-container">
    <div class="card">
      <div class="logo" id="page-header">
        <h1>Sign in</h1>
        <p>Enter your Clouded Account details.</p>
      </div>

      <div id="alert" class="alert hidden"></div>

      <div id="step1">
        <form id="loginForm">
          <div class="form-group">
            <label for="username">Email or username</label>
            <input type="text" id="username" placeholder="user@example.com" required autocomplete="username">
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
          </div>

          <button type="submit" class="btn btn-primary" id="submitBtn">Sign in</button>
        </form>

        <div class="auth-footer">
          <p class="text-muted">
            New to Clouded? <a href="/register.html" class="link">Create account</a>
          </p>
        </div>
      </div>

      <div id="step2" class="hidden">
        <h3 style="margin-bottom: 0.75rem; font-size: 1.125rem; font-weight: 500;">Verify You're Human</h3>
        <p style="font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 1.5rem;">
          Complete the challenge to continue
        </p>

        <div class="captcha-wrapper">
          <div class="iam-captcha" id="login-captcha" data-sitekey="HtFBvvSKHpWEIh1JmOHnwQ4l5hTsGcvu" data-theme="dark" data-mode="inline"></div>
        </div>

        <button type="button" class="btn btn-secondary mt-3" onclick="document.getElementById('step2').classList.add('hidden'); document.getElementById('step1').classList.remove('hidden'); document.getElementById('page-header').classList.remove('hidden');">
          ← Back
        </button>
      </div>

      <div id="step3" class="hidden">
        <form id="totpForm">
          <div class="form-group">
            <label for="totpCode">Two-factor authentication</label>
            <input 
              type="text" 
              id="totpCode" 
              placeholder="Enter 6-digit code" 
              maxlength="6" 
              pattern="[0-9]{6}"
              required
              autocomplete="one-time-code"
            >
          </div>

          <button type="submit" class="btn btn-primary" id="verifyBtn">Verify</button>
        </form>

        <div class="divider">
          <span>or</span>
        </div>

        <button class="btn btn-secondary" id="webauthnBtn">Use Security Key</button>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script src="/static/js/login.js"></script>
</body>
</html>
